name: CI/CD - Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.PRODUCTION_SSH_PORT || 1312 }} -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 1312 }}
          envs: GH_PAT
          command_timeout: 30m
          script: |
            set -e

            DEPLOY_DIR="$HOME/univibe-student"
            CONTAINER_NAME="univibe-student"
            IMAGE_NAME="univibe-student"


            # Clone if first deployment
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "First deployment - cloning repository..."
              cd "$HOME"
              git clone https://${GH_PAT}@github.com/rajabovsherzod/univibe-student.git univibe-student
              cd "$DEPLOY_DIR"
              git remote set-url origin https://${GH_PAT}@github.com/rajabovsherzod/univibe-student.git
            else
              cd "$DEPLOY_DIR"
              git remote set-url origin https://${GH_PAT}@github.com/rajabovsherzod/univibe-student.git
            fi

            echo "Fetching latest changes..."
            git fetch origin

            # Ensure we are on main
            CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")
            if [ "$CURRENT_BRANCH" != "main" ]; then
              echo "Switching to main branch..."
              git checkout main 2>/dev/null || git checkout -b main origin/main
            fi

            echo "Pulling latest code..."
            git reset --hard origin/main

            # Load env variables from server .env file
            if [ -f "$DEPLOY_DIR/.env" ]; then
              echo "Loading environment variables from .env..."
              export $(grep -v '^#' "$DEPLOY_DIR/.env" | xargs)
            else
              echo "WARNING: No .env file found at $DEPLOY_DIR/.env"
            fi

            echo "Building Docker image..."
            sudo docker build \
              --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
              --build-arg NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
              -t "$IMAGE_NAME" .

            echo "Stopping existing container..."
            sudo docker stop "$CONTAINER_NAME" 2>/dev/null || true
            sudo docker rm "$CONTAINER_NAME" 2>/dev/null || true

            echo "Starting new container..."
            sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 81:81 \
              --env-file "$DEPLOY_DIR/.env" \
              "$IMAGE_NAME"

            echo "Waiting for container to be ready..."
            sleep 10

            # Verify container is running
            if sudo docker ps | grep -q "$CONTAINER_NAME"; then
              echo "Container is running!"
            else
              echo "ERROR: Container failed to start!"
              sudo docker logs "$CONTAINER_NAME" --tail=50
              exit 1
            fi

            echo "Cleaning up old images..."
            sudo docker image prune -f || true

            echo "Deployment completed successfully!"
            sudo docker ps | grep "$CONTAINER_NAME"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 1312 }}
          command_timeout: 5m
          script: |
            CONTAINER_NAME="univibe-student"

            echo "Checking container status..."
            if sudo docker ps | grep -q "$CONTAINER_NAME"; then
              echo "Container is running!"
              sudo docker ps | grep "$CONTAINER_NAME"
            else
              echo "Container is not running!"
              sudo docker logs "$CONTAINER_NAME" --tail=100
              exit 1
            fi
